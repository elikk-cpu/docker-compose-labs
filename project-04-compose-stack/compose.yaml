services:
  frontend:
    build:
      context: ./frontend
    image: compose-lab-frontend:0.1.0
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - frontend_net

  backend:
    build:
      context: ./backend
      network: host
    image: compose-lab-backend:0.1.0
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - frontend_net
      - backend_net

  redis:
    image: redis:7.4.2-alpine3.21
    restart: unless-stopped
    networks:
      - backend_net

networks:
  frontend_net:
  backend_net:
