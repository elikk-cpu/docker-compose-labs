services:
  frontend:
    image: final-frontend:${APP_VERSION}
    ports:
      - "127.0.0.1:${FRONTEND_PORT}:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - edge
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  backend:
    image: final-backend:${APP_VERSION}
    environment:
      APP_VERSION: ${APP_VERSION}
      APP_CONFIG_FILE: /app/config/app-config.yaml
      POSTGRES_HOST: database
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: ${POSTGRES_PASSWORD_FILE}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    secrets:
      - postgres_password
    volumes:
      - ./config/app-config.yaml:/app/config/app-config.yaml:ro
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edge
      - data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=2)
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  worker:
    image: final-worker:${APP_VERSION}
    environment:
      POSTGRES_HOST: database
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: ${POSTGRES_PASSWORD_FILE}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    secrets:
      - postgres_password
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - data
    healthcheck:
      test:
        - CMD
        - python
        - /app/healthcheck.py
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  database:
    image: postgres:17.10-alpine3.23
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: ${POSTGRES_PASSWORD_FILE}
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:8.6.4-alpine3.23
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - redis_data:/data
    networks:
      - data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

networks:
  edge:
  data:

volumes:
  postgres_data:
  redis_data:

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
