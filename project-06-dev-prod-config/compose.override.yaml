services:
  app:
    build:
      context: ./app
      network: host
    env_file:
      - ./config/dev.env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    command:
      - flask
      - --app
      - app
      - run
      - --host=0.0.0.0
      - --port=5000
      - --debug
    ports:
      - "127.0.0.1:${APP_PORT}:5000"
    volumes:
      - ./app/app.py:/app/app.py
      - ./config/app-config.yaml:/app/config/app-config.yaml:ro

  database:
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"

  adminer:
    image: adminer:5.3.0-standalone
    profiles:
      - tools
    environment:
      ADMINER_DEFAULT_SERVER: database
    ports:
      - "127.0.0.1:${ADMINER_PORT:-8084}:8080"
    depends_on:
      database:
        condition: service_healthy
